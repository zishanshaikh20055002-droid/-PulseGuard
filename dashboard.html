<!DOCTYPE html>
<html>
<head>
    <title>Edge AI Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 30px;
            transition: background 0.5s ease;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
        }

        .rul {
            font-size: 40px;
            margin: 20px 0;
        }

        .status {
            font-size: 22px;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .HEALTHY { background: green; }
        .WARNING { background: orange; }
        .CRITICAL { background: red; }

        .sensor {
            text-align: left;
            margin-top: 10px;
        }

        .sensor div {
            margin: 5px 0;
        }

        canvas {
            margin-top: 40px;
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>⚙️ Predictive Maintenance Dashboard</h1>

    <div class="card">
        <div><b>Remaining Useful Life</b></div>
        <div class="rul" id="rul">--</div>

        <div class="status" id="status">WAITING</div>

        <div class="sensor">
            <div>🌡 Temp: <span id="temp">--</span></div>
            <div>🌬 Air Temp: <span id="air">--</span></div>
            <div>⚙ Torque: <span id="torque">--</span></div>
            <div>🛠 Tool Wear: <span id="wear">--</span></div>
            <div>🚀 Speed: <span id="speed">--</span></div>
        </div>
    </div>

    <canvas id="rulChart" width="400" height="200"></canvas>

    <script>
        const ws = new WebSocket("ws://127.0.0.1:8000/ws");

        let rulData = [];
        let labels = [];

        const ctx = document.getElementById('rulChart').getContext('2d');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'RUL over Time',
                    data: rulData,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true
            }
        });

        ws.onopen = function() {
            console.log("Connected 🚀");
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);

            document.getElementById("rul").innerText = data.RUL.toFixed(2);

            let statusEl = document.getElementById("status");
            statusEl.innerText = data.status;
            statusEl.className = "status " + data.status;

            document.getElementById("temp").innerText = data.temperature.toFixed(2);
            document.getElementById("air").innerText = data.air_temperature.toFixed(2);
            document.getElementById("torque").innerText = data.torque.toFixed(2);
            document.getElementById("wear").innerText = data.tool_wear.toFixed(2);
            document.getElementById("speed").innerText = data.speed.toFixed(2);

            labels.push(data.step);
            rulData.push(data.RUL);

            if (labels.length > 20) {
                labels.shift();
                rulData.shift();
            }

            chart.update();

            if (data.status === "CRITICAL") {
    document.body.style.background = "#3b0000";

    // blinking effect
    document.body.style.opacity = (document.body.style.opacity == "1") ? "0.7" : "1";

} else if (data.status === "WARNING") {
    document.body.style.background = "#3b2f00";
    document.body.style.opacity = "1";

} else {
    document.body.style.background = "#0f172a";
    document.body.style.opacity = "1";
}
        };

        ws.onerror = function(error) {
            console.error("WebSocket error:", error);
        };

        ws.onclose = function() {
            console.log("Disconnected");
        };
    </script>

</body>
</html>
